services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: loft_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d loft_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  client-bot:
    build: .
    env_file: .env
    environment:
      BOT_MODE: client
      DATABASE_URL: postgres://user:pass@postgres:5432/loft_db?sslmode=disable
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  admin-bot:
    build: .
    env_file: .env
    environment:
      BOT_MODE: admin
      DATABASE_URL: postgres://user:pass@postgres:5432/loft_db?sslmode=disable
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
