services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: loft_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d loft_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  bots:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://user:pass@postgres:5432/loft_db?sslmode=disable
      WEBAPP_URL: https://your-domain.com
      WEBAPP_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
